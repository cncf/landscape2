<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ foundation }} Landscape</title>
    <style>
      :root {
        color-scheme: light;
        --color1: rgba(0, 107, 204, 1);
        --color2: rgba(214, 34, 147, 1);
        --color3: rgba(96, 149, 214, 1);
        --color4: rgba(0, 42, 81, 0.7);
        --color5: rgba(1, 107, 204, 0.7);
        --color6: rgba(0, 42, 81, 0.7);
        --color7: rgba(180, 219, 255, 1);
        {% if let Some(colors) = colors -%}
          --color1: {{ colors.color1 }};
          --color2: {{ colors.color2 }};
          --color3: {{ colors.color3 }};
          --color4: {{ colors.color4 }};
          --color5: {{ colors.color5 }};
          --color6: {{ colors.color6 }};
          --color7: {{ colors.color7 }};
        {% endif -%}
        --page-bg: #f8f9fa;
        --surface: #ffffff;
        --surface-soft: #f8f9fa;
        --text: #10233a;
        --muted: #586579;
        --border: rgba(16, 35, 58, 0.12);
        --shadow: 0 10px 28px rgba(16, 35, 58, 0.06);
        --badge-muted-bg: rgba(16, 35, 58, 0.08);
        --pill-border: rgba(16, 35, 58, 0.08);
        --focus-ring: rgba(0, 107, 204, 0.1);
        --link-hover-bg: rgba(16, 35, 58, 0.04);
        --radius: 14px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --page-bg: #08131f;
          --surface: #102133;
          --surface-soft: #13283f;
          --text: #f1f7ff;
          --muted: #aac0d5;
          --border: rgba(180, 219, 255, 0.12);
          --shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
          --badge-muted-bg: rgba(180, 219, 255, 0.14);
          --pill-border: rgba(180, 219, 255, 0.12);
          --focus-ring: rgba(96, 149, 214, 0.18);
          --link-hover-bg: rgba(180, 219, 255, 0.08);
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--page-bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Helvetica,
          Arial,
          sans-serif,
          Roboto,
          "Noto Sans",
          Ubuntu,
          "Apple Color Emoji",
          "Segoe UI Emoji",
          "Segoe UI Symbol";
        color: var(--text);
        background: var(--page-bg);
      }

      a {
        color: var(--color1);
      }

      img {
        display: block;
        max-width: 100%;
      }

      .page {
        min-height: 100vh;
        padding: 16px 14px 28px;
      }

      .shell {
        width: min(100%, 860px);
        margin: 0 auto;
      }

      .status-card,
      .hero,
      .section-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .status-card {
        min-height: calc(100vh - 52px);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .status-content {
        width: min(100%, 440px);
        text-align: center;
      }

      .spinner {
        width: 54px;
        height: 54px;
        margin: 0 auto 18px;
        border: 4px solid rgba(0, 107, 204, 0.18);
        border-top-color: var(--color1);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .status-title {
        margin: 0 0 10px;
        font-size: 1.45rem;
        line-height: 1.15;
      }

      .status-text {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .status-actions {
        margin-top: 20px;
      }

      .button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid var(--color1);
        background: var(--color1);
        color: #ffffff;
        font-weight: 600;
        text-decoration: none;
      }

      .hero {
        padding: 24px 18px 30px;
      }

      .hero-top {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 72px;
        gap: 20px;
        align-items: center;
      }

      .hero-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
      }

      .hero-logo {
        justify-self: end;
      }

      .project-logo,
      .logo-fallback {
        width: 72px;
        height: 72px;
      }

      .project-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        object-fit: contain;
      }

      .logo-fallback {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--color1);
        font-size: 2rem;
        font-weight: 500;
      }

      .title {
        margin: 0;
        font-size: 1.2rem;
        line-height: 1.3;
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .description {
        margin: 26px 0 24px;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .badge-row,
      .stat-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .badge-row {
        margin-top: 10px;
      }

      .badge,
      .stat-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 30px;
        padding: 5px 10px;
        font-size: 0.74rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        text-decoration: none;
      }

      .badge {
        border-radius: 999px;
      }

      .badge-foundation {
        background: var(--color1);
        color: #ffffff;
      }

      .badge-maturity {
        background: var(--badge-muted-bg);
        color: var(--text);
      }

      .badge-maturity.archived {
        background: #f59f00;
        color: #ffffff;
      }

      .stat-row {
        margin-top: 16px;
        gap: 10px;
      }

      .stat-pill {
        gap: 8px;
        justify-content: flex-start;
        flex: 0 0 100%;
        background: var(--surface-soft);
        border: 1px solid var(--pill-border);
        border-radius: 8px;
        color: var(--text);
        text-transform: none;
        letter-spacing: 0;
        font-size: 0.88rem;
        font-weight: 500;
        padding: 8px 12px;
      }

      .stat-pill:nth-child(-n + 2) {
        flex-basis: calc((100% - 10px) / 2);
      }

      .stat-label {
        color: var(--muted);
        font-weight: 500;
      }

      .stat-value {
        font-weight: 600;
      }

      .sections {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .section-card {
        padding: 18px 20px;
      }

      .section-title {
        margin: 0 0 18px;
        font-size: 0.96rem;
        font-weight: 700;
      }

      .link-list {
        display: grid;
        gap: 14px;
      }

      .link-item {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 34px;
        padding: 4px 8px 4px 16px;
        border-radius: 10px;
        text-decoration: none;
        color: inherit;
        background: transparent;
        border: 0;
        -webkit-tap-highlight-color: transparent;
        transition:
          background-color 0.16s ease,
          color 0.16s ease;
      }

      .link-item:focus-visible {
        background: var(--link-hover-bg);
        color: var(--color1);
        box-shadow: none;
        outline: none;
      }

      .link-icon {
        flex: 0 0 20px;
        width: 20px;
        height: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        overflow: visible;
      }

      .link-item:focus-visible .link-icon {
        color: var(--color1);
      }

      .link-icon svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .link-copy {
        display: inline-flex;
        align-items: center;
      }

      .link-label {
        font-weight: 400;
        font-size: 0.98rem;
        line-height: 1.35;
      }

      .footer-card {
        margin-top: 20px;
        padding: 0 16px;
        color: var(--muted);
        text-align: center;
        font-size: 0.84rem;
        font-weight: 400;
      }

      .footer-card a {
        color: inherit;
        text-decoration: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (min-width: 720px) {
        .page {
          padding: 24px 20px 40px;
        }

        .shell {
          min-height: calc(100vh - 64px);
          display: flex;
          flex-direction: column;
        }

        .hero {
          padding: 28px 24px 34px;
        }

        .hero-top {
          grid-template-columns: minmax(0, 1fr) 96px;
          gap: 24px;
        }

        .project-logo,
        .logo-fallback {
          width: 96px;
          height: 96px;
        }

        .title {
          font-size: 2.05rem;
        }

        .stat-pill,
        .stat-pill:nth-child(-n + 2) {
          flex: 0 0 auto;
        }

        .sections {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .footer-card {
          margin-top: auto;
          padding-top: 22px;
        }
      }

      @media (hover: hover) and (pointer: fine) {
        .link-item:hover {
          background: var(--link-hover-bg);
          color: var(--color1);
          box-shadow: none;
          outline: none;
        }

        .link-item:hover .link-icon {
          color: var(--color1);
        }
      }
    </style>
  </head>

        <path d="M524.531,69.836a1.5,1.5,0,0,0-.764-.7A485.065,485.065,0,0,0,404.081,32.03a1.816,1.816,0,0,0-1.923.91,337.461,337.461,0,0,0-14.9,30.6,447.848,447.848,0,0,0-134.426,0,309.541,309.541,0,0,0-15.135-30.6,1.89,1.89,0,0,0-1.924-.91A483.689,483.689,0,0,0,116.085,69.137a1.712,1.712,0,0,0-.788.676C39.068,183.651,18.186,294.69,28.43,404.354a2.016,2.016,0,0,0,.765,1.375A487.666,487.666,0,0,0,176.02,479.918a1.9,1.9,0,0,0,2.063-.676A348.2,348.2,0,0,0,208.12,430.4a1.86,1.86,0,0,0-1.019-2.588,321.173,321.173,0,0,1-45.868-21.853,1.885,1.885,0,0,1-.185-3.126c3.082-2.309,6.166-4.711,9.109-7.137a1.819,1.819,0,0,1,1.9-.256c96.229,43.917,200.41,43.917,295.5,0a1.812,1.812,0,0,1,1.924.233c2.944,2.426,6.027,4.851,9.132,7.16a1.884,1.884,0,0,1-.162,3.126,301.407,301.407,0,0,1-45.89,21.83,1.875,1.875,0,0,0-1,2.611,391.055,391.055,0,0,0,30.014,48.815,1.864,1.864,0,0,0,2.063.7A486.048,486.048,0,0,0,610.7,405.729a1.882,1.882,0,0,0,.765-1.352C623.729,277.594,590.933,167.465,524.531,69.836ZM222.491,337.58c-28.972,0-52.844-26.587-52.844-59.239S193.056,219.1,222.491,219.1c29.665,0,53.306,26.82,52.843,59.239C275.334,310.993,251.924,337.58,222.491,337.58Zm195.38,0c-28.971,0-52.843-26.587-52.843-59.239S388.437,219.1,417.871,219.1c29.667,0,53.307,26.82,52.844,59.239C470.715,310.993,447.538,337.58,417.871,337.58Z"></path>
      </symbol>
      <symbol id="icon-mailing" viewBox="0 0 24 24">
        <path fill="none" d="M0 0h24v24H0z"></path>

      </symbol>
      <symbol id="icon-stackoverflow" viewBox="0 0 16 16">

      </symbol>
      <symbol id="icon-bluesky" viewBox="0 0 576 512">

      </symbol>
      <symbol id="icon-reddit" viewBox="0 0 512 512">
        <path d="M283.5 345.5c2.7 2.7 2.7 7.1 0 9.9-25.3 25.3-66.4 25.3-91.7 0-2.7-2.7-2.7-7.1 0-9.9 2.7-2.7 7.1-2.7 9.9 0 19.8 19.8 52.1 19.8 71.9 0 2.8-2.8 7.2-2.8 9.9 0zm-51-41.3c0-13.7-11.1-24.8-24.8-24.8s-24.8 11.1-24.8 24.8 11.1 24.8 24.8 24.8 24.8-11.1 24.8-24.8zm95.5-24.8c-13.7 0-24.8 11.1-24.8 24.8s11.1 24.8 24.8 24.8 24.8-11.1 24.8-24.8-11.1-24.8-24.8-24.8z"></path>
        <path d="M436.3 228.5c.7-4.9 1.1-9.8 1.1-14.8 0-68.7-56.1-124.8-124.8-124.8-34.1 0-65.1 13.8-87.7 36.1-22.6-14.2-48.7-22.4-76.8-22.4-81.2 0-147.2 66-147.2 147.2 0 4.6.2 9.1.6 13.6C16 270.8 0 294.1 0 321c0 42.2 34.4 76.6 76.6 76.6 6.1 0 12-0.8 17.7-2.1 25.2 32.1 63.2 52.8 106 52.8 28 0 53.8-8.9 74.9-23.9 20.6 12.8 44.8 20.2 70.8 20.2 74.7 0 135.5-60.8 135.5-135.5 0-35.4-13.7-67.7-36.2-91.8zm-90.3 185.6c-24.2 0-46.7-7.2-65.5-19.4-23 16.8-51.3 26.8-81.8 26.8-39.7 0-75.5-16.9-100.7-43.8-6.7 2.4-13.8 3.7-21.2 3.7-34.5 0-62.5-28-62.5-62.5 0-23.7 13.2-44.3 32.7-54.9-.9-5.4-1.4-10.9-1.4-16.6 0-68.1 55.4-123.5 123.5-123.5 26.4 0 50.8 8.3 70.8 22.5 21.1-24.2 52.1-39.5 86.6-39.5 63.7 0 115.5 51.8 115.5 115.5 0 7.3-.7 14.5-2 21.4 20.7 21.1 33.5 50 33.5 81.9.1 64-52 116.4-116 116.4z"></path>
      </symbol>
    </svg>
    <main id="app" class="page" aria-live="polite"></main>
    <script>
      (() => {
        const app = document.getElementById('app');
        const landscapeUrl = {{ url|json|safe }};
        const landscapeFoundation = {{ foundation|json|safe }};

        /**
         * Normalize text used in plain UI strings.
         *
         * @param {unknown} value
         * @returns {string}
         */
        const normalizeText = (value) => String(value || '').replace(/\s+/g, ' ').trim();

        /**
         * Keep only safe URLs for links and images.
         *
         * @param {unknown} value
         * @returns {string}
         */
        const sanitizeUrl = (value) => {
          if (typeof value !== 'string') {
            return '';
          }

          const trimmedValue = value.trim();

          if (!trimmedValue) {
            return '';
          }

          try {
            const parsedUrl = new URL(trimmedValue, window.location.origin);

            if (!['http:', 'https:', 'mailto:', 'tel:'].includes(parsedUrl.protocol)) {
              return '';
            }

            return parsedUrl.href;
          } catch (error) {
            return '';
          }
        };

        /**
         * Escape HTML before injecting dynamic content.
         *
         * @param {unknown} value
         * @returns {string}
         */
        const escapeHtml = (value) =>
          String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        /**
         * Format numeric repository stats for display.
         *
         * @param {unknown} value
         * @returns {string}
         */
        const formatNumber = (value) => {
          if (typeof value !== 'number' || Number.isNaN(value)) {
            return '';
          }

          if (value >= 999500) {
            return `${new Intl.NumberFormat('en-US', {
              maximumFractionDigits: value >= 10000000 ? 0 : 1,
              minimumFractionDigits: 0,
            }).format(value / 1000000)}M`;
          }

          if (value >= 999.5) {
            return `${new Intl.NumberFormat('en-US', {
              maximumFractionDigits: value >= 10000 ? 0 : 1,
              minimumFractionDigits: 0,
            }).format(value / 1000)}k`;
          }

          return new Intl.NumberFormat('en-US', {
            maximumFractionDigits: 0,
          }).format(value);
        };

        const dateFormatter = new Intl.DateTimeFormat(undefined, {
          month: 'short',
          day: 'numeric',
          year: 'numeric',
          timeZone: 'UTC',
        });

        /**
         * Format a project or release date for the kiosk UI.
         *
         * @param {string | number | Date | null | undefined} value
         * @returns {string}
         */
        const formatDate = (value) => {
          if (!value) {
            return '';
          }

          const date = new Date(value);

          if (Number.isNaN(date.getTime())) {
            return escapeHtml(value);
          }

          return dateFormatter
            .format(date)
            .replace(/\b([a-z])/, (match, character) => character.toUpperCase());
        };

        const getQueryItem = () => {
          const params = new URLSearchParams(window.location.search);
          return (params.get('item') || '').trim();
        };

        /**
         * Pick the main repository to show project stats and links.
         *
         * @param {Record<string, unknown>} item
         * @returns {Record<string, unknown> | null}
         */
        const getPrimaryRepository = (item) => {
          const repositories = Array.isArray(item && item.repositories) ? item.repositories : [];
          return repositories.find((repository) => repository && repository.primary) || repositories[0] || null;
        };

        /**
         * Select the best available summary line for the project.
         *
         * @param {Record<string, unknown>} item
         * @returns {string}
         */
        const getDescription = (item) => {
          const summary = item && item.summary ? item.summary : {};

          return [
            item && item.description,
            summary.use_case,
            summary.business_use_case,
            summary.integrations,
            summary.integration,
          ].find((value) => typeof value === 'string' && value.trim()) || '';
        };

        /**
         * Render a site icon from the inline SVG sprite.
         *
         * @param {string} icon
         * @returns {string}
         */
        const renderIcon = (icon) =>
          `<span class="link-icon" aria-hidden="true"><svg fill="currentColor" xmlns="http://www.w3.org/2000/svg"><use href="#icon-${icon}"></use></svg></span>`;

        /**
         * Build an API URL relative to the current kiosk page.
         *
         * @param {string} itemId
         * @returns {string}
         */
        const getProjectApiUrl = (itemId) => {
          const currentUrl = new URL(window.location.href);
          const apiUrl = new URL(`api/projects/${encodeURIComponent(itemId)}.json`, currentUrl);
          return apiUrl.href;
        };

        /**
         * Build the link groups shown below the hero card.
         *
         * @param {Record<string, unknown>} item
         * @param {Record<string, unknown> | null} primaryRepository
         * @returns {Array<{title: string, links: Array<{icon: string, label: string, url: string}>}>}
         */
        const buildSections = (item, primaryRepository) => {
          const summary = item.summary || {};
          const sections = [
            {
              title: 'Get Started',
              links: [
                { icon: 'world', label: 'Website', url: item.homepage_url },
                { icon: 'blog', label: 'Intro', url: summary.intro_url },
              ],
            },
            {
              title: 'Contribute',
              links: [
                {
                  icon: 'github',
                  label: 'Repository',
                  url: primaryRepository && primaryRepository.url,
                },
                {
                  icon: 'goodfirstissues',
                  label: 'Good first issues',
                  url:
                    item.maturity !== 'archived' &&
                    primaryRepository && primaryRepository.url
                      ? `${primaryRepository.url}/issues?q=is%3Aopen+is%3Aissue+label%3A%22good+first+issue%22`
                      : '',
                },
              ],
            },
            {
              title: 'Community',
              links: [
                { icon: 'slack', label: 'Slack', url: item.slack_url },
                { icon: 'discord', label: 'Discord', url: item.discord_url },
                { icon: 'mailing', label: 'Mailing List', url: item.mailing_list_url },
                { icon: 'discussions', label: 'GitHub Discussions', url: item.github_discussions_url },
                { icon: 'stackoverflow', label: 'Stack Overflow', url: item.stack_overflow_url },
              ],
            },
            {
              title: 'Social',
              links: [
                { icon: 'blog', label: 'Blog', url: item.blog_url },
                { icon: 'twitter', label: 'X / Twitter', url: item.twitter_url },
                { icon: 'bluesky', label: 'Bluesky', url: item.bluesky_url },
                { icon: 'youtube', label: 'YouTube', url: item.youtube_url },
                { icon: 'linkedin', label: 'LinkedIn', url: item.linkedin_url },
                { icon: 'reddit', label: 'Reddit', url: item.reddit_url },
              ],
            },
          ];

          return sections
            .map((section) => ({
              title: section.title,
              links: section.links
                .map((link) => ({
                  ...link,
                  url: sanitizeUrl(link.url),
                }))
                .filter((link) => link.url),
            }))
            .filter((section) => section.links.length > 0);
        };

        /**
         * Render a loading or empty state card.
         *
         * @param {object} options
         * @param {string} options.title
         * @param {string} options.message
         * @param {boolean} [options.loading]
         * @param {string} [options.actionLabel]
         * @param {string} [options.actionUrl]
         * @returns {void}
         */
        const renderStatus = ({ title, message, loading = false, actionLabel = '', actionUrl = '' }) => {
          const resolvedActionUrl = sanitizeUrl(actionUrl || landscapeUrl);
          const actionsMarkup =
            !loading && actionLabel && resolvedActionUrl
              ? `
                  <div class="status-actions">
                    <a class="button-link" href="${escapeHtml(resolvedActionUrl)}">${escapeHtml(actionLabel)}</a>
                  </div>
                `
              : '';

          app.innerHTML = `
            <div class="shell">
              <section class="status-card">
                <div class="status-content">
                  ${loading ? '<div class="spinner" aria-hidden="true"></div>' : ''}
                  <h1 class="status-title">${escapeHtml(title)}</h1>
                  <p class="status-text">${escapeHtml(message)}</p>
                  ${actionsMarkup}
                </div>
              </section>
            </div>
          `;
        };

        /**
         * Render the loaded project data into the kiosk layout.
         *
         * @param {Record<string, unknown>} item
         * @returns {void}
         */
        const renderProject = (item) => {
          const foundation = landscapeFoundation;
          const description = getDescription(item);
          const primaryRepository = getPrimaryRepository(item);
          const sections = buildSections(item, primaryRepository);
          const maturity = item.maturity ? String(item.maturity).trim() : '';
          const maturityClass = maturity.toLowerCase() === 'archived' ? ' archived' : '';
          const stats = [
            primaryRepository && typeof primaryRepository.stars === 'number'
              ? { label: 'Stars', value: formatNumber(primaryRepository.stars) }
              : null,
            primaryRepository && typeof primaryRepository.contributors === 'number'
              ? { label: 'Contributors', value: formatNumber(primaryRepository.contributors) }
              : null,
            primaryRepository && primaryRepository.license
              ? { label: 'License', value: primaryRepository.license }
              : null,
            primaryRepository && primaryRepository.latest_release
              ? { label: 'Latest release', value: formatDate(primaryRepository.latest_release) }
              : null,
          ].filter(Boolean);

          const statsMarkup =
            stats.length > 0
              ? `<div class="stat-row">${stats
                  .map(
                    (stat) => `
                      <div class="stat-pill">
                        <span class="stat-label">${escapeHtml(stat.label)}</span>
                        <span class="stat-value">${escapeHtml(stat.value)}</span>
                      </div>
                    `
                  )
                  .join('')}</div>`
              : '';

          const sectionsMarkup =
            sections.length > 0
              ? `
                <section class="sections">
                  ${sections
                    .map(
                      (section) => `
                        <article class="section-card">
                          <h2 class="section-title">${escapeHtml(section.title)}</h2>
                          <div class="link-list">
                            ${section.links
                              .map(
                                (link) => `
                                  <a class="link-item" href="${escapeHtml(link.url)}" target="_blank" rel="noreferrer noopener">
                                    ${renderIcon(link.icon)}
                                    <span class="link-copy">
                                      <span class="link-label">${escapeHtml(link.label)}</span>
                                    </span>
                                  </a>
                                `
                              )
                              .join('')}
                          </div>
                        </article>
                      `
                    )
                    .join('')}
                </section>
              `
              : '';

          const projectLogoUrl = sanitizeUrl(item.logo_url);
          const logoMarkup = projectLogoUrl
            ? `<img class="project-logo" src="${escapeHtml(projectLogoUrl)}" alt="${escapeHtml(item.name)} logo" loading="eager" />`
            : `<span class="logo-fallback">${escapeHtml(item.name.charAt(0) || '?')}</span>`;

          const titleName = normalizeText(item.name);
          const titleLandscape = normalizeText(foundation ? `${foundation} Landscape` : 'Landscape');
          document.title = `${titleName} | ${titleLandscape}`;

          app.innerHTML = `
            <div class="shell">
              <section class="hero">
                <div class="hero-top">
                  <div class="hero-copy">
                    <h1 class="title">${escapeHtml(item.name)}</h1>
                    <div class="badge-row">
                      ${foundation ? `<span class="badge badge-foundation">${escapeHtml(foundation)}</span>` : ''}
                      ${maturity ? `<span class="badge badge-maturity${maturityClass}">${escapeHtml(maturity)}</span>` : ''}
                    </div>
                  </div>
                  <div class="hero-logo">${logoMarkup}</div>
                </div>
                ${description ? `<p class="description">${escapeHtml(description)}</p>` : ''}
                ${statsMarkup}
              </section>
              ${sectionsMarkup}
              <footer class="footer-card">Powered by <a href="${escapeHtml(landscapeUrl)}">${escapeHtml(foundation ? `${foundation} Landscape` : 'Landscape')}</a></footer>
            </div>
          `;
        };

        /**
         * Fetch the requested item and update the page state.
         *
         * @returns {Promise<void>}
         */
        const loadProject = async () => {
          const item = getQueryItem();

          if (!item) {
            renderStatus({
              title: 'No data available',
              message: 'Add an item query parameter to load a project from the landscape.',
              actionLabel: 'Browse the landscape',
            });
            return;
          }

          renderStatus({
            title: 'Loading project',
            message: 'Fetching the latest project details from the landscape API.',
            loading: true,
          });

          try {
            const response = await fetch(getProjectApiUrl(item), {
              headers: {
                Accept: 'application/json',
              },
            });

            if (!response.ok) {
              renderStatus({
                title: 'No data available',
                message: 'We could not find project data for the requested item.',
                actionLabel: 'Browse the landscape',
              });
              return;
            }

            const project = await response.json();

            if (!project || typeof project !== 'object' || !project.id) {
              renderStatus({
                title: 'No data available',
                message: 'The project response did not include usable data.',
                actionLabel: 'Browse the landscape',
              });
              return;
            }

            renderProject(project);
          } catch (error) {
            renderStatus({
              title: 'No data available',
              message: 'Something went wrong while loading project data.',
              actionLabel: 'Browse the landscape',
            });
          }
        };

        loadProject();
      })();
    </script>
